openapi: 3.0.3

info:
  title: Users Service API
  description: Сервис управления пользователями
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Users Service

tags:
  - name: users
    description: Операции с пользователями
  - name: health
    description: Проверка работоспособности

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /users:
    get:
      summary: Получить список пользователей
      operationId: listUsers
      tags: [users]
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      summary: Создать пользователя
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email уже занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'

    get:
      summary: Получить пользователя по ID
      operationId: getUser
      tags: [users]
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Удалить пользователя
      operationId: deleteUser
      tags: [users]
      responses:
        '204':
          description: Пользователь удалён
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      description: Уникальный идентификатор пользователя
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    User:
      type: object
      required: [id, name, email, created_at]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Иван Иванов"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Иван Иванов"
        email:
          type: string
          format: email
          example: "ivan@example.com"

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "User not found"

  responses:
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Неверный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
