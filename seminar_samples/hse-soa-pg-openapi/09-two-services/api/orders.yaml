openapi: 3.0.3

info:
  title: Orders Service API
  description: |
    Сервис управления заказами.
    Для создания заказа требует существующего пользователя из Users Service.
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Orders Service

tags:
  - name: orders
    description: Операции с заказами

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Сервис работает

  /orders:
    get:
      summary: Получить список заказов
      operationId: listOrders
      tags: [orders]
      parameters:
        - name: user_id
          in: query
          description: Фильтр по пользователю
          required: false
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          description: Фильтр по статусу
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

    post:
      summary: Создать заказ
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Заказ создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "USER_NOT_FOUND"
                message: "User with id 42 not found"

  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      summary: Получить заказ по ID
      operationId: getOrder
      tags: [orders]
      responses:
        '200':
          description: Заказ найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Обновить статус заказа
      operationId: updateOrderStatus
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Статус обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    OrderStatus:
      type: string
      enum:
        - pending    # Ожидает обработки
        - confirmed  # Подтверждён
        - shipped    # Отправлен
        - delivered  # Доставлен
        - cancelled  # Отменён
      example: "pending"

    Order:
      type: object
      required: [id, user_id, product, amount, status, created_at]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user_id:
          type: integer
          format: int64
          description: ID пользователя из Users Service
          example: 42
        product:
          type: string
          example: "Ноутбук Dell XPS 13"
        amount:
          type: number
          format: double
          description: Сумма заказа
          example: 99999.99
        status:
          $ref: '#/components/schemas/OrderStatus'
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    CreateOrderRequest:
      type: object
      required: [user_id, product, amount]
      properties:
        user_id:
          type: integer
          format: int64
          description: ID существующего пользователя
          example: 1
        product:
          type: string
          minLength: 1
          maxLength: 255
          example: "Ноутбук Dell XPS 13"
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 99999.99

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "Order not found"

  responses:
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Неверный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
