  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: |-
        JWT access token для аутентификации.
        Формат: "Bearer {access_token}"

        Роли в токене (claim "role"):
        - USER: обычный покупатель
        - SELLER: продавец (может управлять товарами)
        - ADMIN: администратор (полный доступ)
      scheme: bearer
      type: http
